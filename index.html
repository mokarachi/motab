// ===== NORMAL FUNCTION =====
function getNormalTemp(code, month, day, time){
    if(time !== "0300" && time !== "1200") return "__";

    // Choose dataset based on time
    let dataset = (time === "0300") ? minTempStations : maxTempStations;

    // Find station record
    let st = dataset.find(s => s.station === code);
    if(!st || !st.data[month]) return "__";

    // Return normal value for that day
    return st.data[month][day-1] ?? "__";
}


// ===== DATE FORMAT =====
function formatDate(d){
    let p=d.split('/');
    if(p.length!==3) return "__";
    return p[2].slice(-2)+p[1].padStart(2,'0')+p[0].padStart(2,'0');
}
function formatDateForTable(dateStr){
    // dateStr is currently like "260329" (yyMMdd)
    if(dateStr==="__") return "__";
    let yy = dateStr.slice(0,2);
    let mm = dateStr.slice(2,4);
    let dd = dateStr.slice(4,6);
    return dd + "/" + mm + "/" + yy;
}


// ===== MAIN FUNCTION =====
function extractData(){

let todayData=document.getElementById("todaySynop").value.trim().split("\n");
let yestData=document.getElementById("yesterdaySynop").value.trim().split("\n");
let dateInput=document.getElementById("dateInput").value.trim();
let timeInput=document.getElementById("timeInput").value.trim();
let tbody=document.querySelector("#outputTable tbody");
tbody.innerHTML="";

// ===== DATE =====
let date="__";
if(todayData[0]){
    let m=todayData[0].match(/\d{2}\/\d{2}\/\d{4}/);
    if(m) date=formatDate(m[0]);
}
if(date==="__" && dateInput) date=formatDate(dateInput);
if(date==="__"){
    let d=new Date();
    date=String(d.getFullYear()).slice(-2)
        +String(d.getMonth()+1).padStart(2,'0')
        +String(d.getDate()).padStart(2,'0');
}

// ===== TIME =====
let time="__";
if(todayData[1]){
    let m=todayData[1].match(/\d{4}/);
    if(m) time=m[0];
}
if(time==="__" && timeInput) time=timeInput;

// ===== MONTH/DAY =====
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let month=months[parseInt(date.slice(2,4))-1]||"Mar";
let day=parseInt(date.slice(4,6))||1;

// ===== LOOP =====
stationList.forEach((code,i)=>{

let station=stationNames[i]||"__";

let todayTemp="__",yestTemp="__",change="__";
let oct="__",WX="__",PWx="__",rain3="__",rain12="__",rain24="__",RH="__";

// ===== TODAY =====
todayData.forEach(line=>{
if(!line.includes(code)) return;

let parts=line.trim().split(/\s+/);

// Octa
if(parts[2]) oct=parts[2][0];

// Exclusions
let coreParts=parts.slice(3);
let loopTokens=coreParts.slice(0,-4);

// 333 split
let i333=coreParts.indexOf("333");
let after333=(i333>=0)?coreParts.slice(i333+1):[];

// TODAY TEMP
after333.forEach(x=>{
if(x.startsWith("1")||x.startsWith("2")){
let sign=(x[1]==='1')?-1:1;
let val=parseInt(x.slice(-3))/10;
if(!isNaN(val)) todayTemp=(sign*val).toFixed(1);
}
});

// Rain3
after333.forEach(x=>{
if(x.startsWith("6") && x.endsWith("7")){
    let val = parseInt(x.slice(1,4));

    if(val === 999){
        rain3 = "T"; // Trace
    }
    else if(val >= 991 && val <= 999){
        rain3 = ((val - 990) / 10).toFixed(1);
    }
    else{
        rain3 = val || rain3;
    }
}
});

// Rain24
after333.forEach(x=>{
if(x.startsWith("7") &&x.length===5)
rain24=parseInt(x.slice(-4))/10||rain24;
});

// RH
after333.forEach(x=>{
if(x.startsWith("RH"))
RH=parseInt(x.slice(2,4))||RH;
});
// RH
after333.forEach(x=>{
    if(x.startsWith("RH")) {
        RH = parseInt(x.slice(2,4)) || RH;
    }
});

// If RH still missing, try to find "%"
if(RH === "__" || RH === undefined) {
    let lineText = todayData.find(line => line.includes(code));
    if(lineText) {
        let m = lineText.match(/(\d{2})%/);
        if(m) {
            RH = m[1]; // last two digits before %
        }
    }
}


// WX / PWX / Rain12
loopTokens.forEach(x=>{
if(x.startsWith("7") && x.length===5){
WX=parseInt(x.slice(1,3))||WX;
PWx=parseInt(x.slice(3,5))||PWx;
}
if(x.startsWith("6") && x.endsWith("2")){
    let val = parseInt(x.slice(1,4));

    if(val === 999){
        rain12 = "T"; // Trace
    }
    else if(val >= 991 && val <= 999){
        rain12 = ((val - 990) / 10).toFixed(1);
    }
    else{
        rain12 = val || rain12;
    }
}

});




});

// ===== YESTERDAY =====
yestData.forEach(line=>{
if(!line.includes(code)) return;

let parts=line.trim().split(/\s+/);
let coreParts=parts.slice(3);

let i333=coreParts.indexOf("333");
let after333=(i333>=0)?coreParts.slice(i333+1):[];

after333.forEach(x=>{
if(x.startsWith("1")||x.startsWith("2")){
let sign=(x[1]==='1')?-1:1;
let val=parseInt(x.slice(-3))/10;
if(!isNaN(val)) yestTemp=(sign*val).toFixed(1);
}
});
});

// ===== NORMAL =====
let normal=getNormalTemp(code,month,day,time);

// ===== DEP =====
let dep="__";
if(todayTemp!=="__" && normal!=="__")
dep=(todayTemp-normal).toFixed(1);

// ===== CHANGE =====
if(todayTemp!=="__" && yestTemp!=="__")
change=(todayTemp-yestTemp).toFixed(1);

// ===== ROW =====
let tr=document.createElement("tr");
tr.innerHTML=`
<td>${station}</td><td>${code}</td><td>${formatDateForTable(date)}</td><td>${time}</td>
<td>${todayTemp}</td><td>${yestTemp}</td>
<td>${normal}</td><td>${dep}</td><td>${change}</td>
<td>${oct}</td><td>${WX}</td><td>${PWx}</td>
<td>${rain3}</td><td>${rain12}</td><td>${rain24}</td><td>${RH}</td>
`;
tbody.appendChild(tr);

});
// Auto copy after extraction
copyTable();
}




function copyTable() {
    let table = document.getElementById("outputTable");
    let range = document.createRange();
    range.selectNode(table);
    let selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);

    try {
        document.execCommand("copy");
    } catch (err) {
    }

    selection.removeAllRanges();
}
